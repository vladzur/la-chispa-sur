<!doctype html>
<html lang="es">
  <head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1A365D" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="La Chispa Sur" />

  <!-- SEO: Canonical base para la Home. Las rutas /post/* reciben sus propias
       og:* desde la CF renderPostTags; el cliente las actualiza vía useHead. -->
  <link rel="canonical" href="https://lachispasur.cl/" />
  <meta property="og:site_name" content="La Chispa Sur" />
  <meta name="twitter:site" content="@lachispasur" />

  <!-- Google Search Console: reemplaza el content con tu código de verificación -->
  <!-- <meta name="google-site-verification" content="TU_CODIGO_AQUI" /> -->

  <!-- Preload critical font variant to avoid FOIT -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" />
  <!-- Non-blocking font load: media=print trick avoids render-blocking -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap" />
  </noscript>

  <title>La Chispa Sur</title>
  <!-- __META_TAGS__ -->
</head>

  </body>
</html>
