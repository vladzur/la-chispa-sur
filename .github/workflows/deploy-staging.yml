name: Deploy Staging

on:
  push:
    branches:
      - staging
      - develop # Se ejecuta cuando hay push o merge a las ramas staging/develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}'

      - name: Deploy to Cloud Run (Staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: la-chispa-sur-staging
          region: us-central1
          source: ./ 
          flags: '--allow-unauthenticated'
          # Asegúrate de configurar los secretos correspondientes a Staging en GitHub
          env_vars: |-
            NUXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.STAGING_FIREBASE_API_KEY }}
            NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.STAGING_FIREBASE_AUTH_DOMAIN }}
            NUXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
            NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.STAGING_FIREBASE_STORAGE_BUCKET }}
            NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.STAGING_FIREBASE_MESSAGING_SENDER_ID }}
            NUXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.STAGING_FIREBASE_APP_ID }}
            NUXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.STAGING_FIREBASE_MEASUREMENT_ID }}
            FIREBASE_PROJECT_ID=${{ secrets.STAGING_FIREBASE_PROJECT_ID }}
          # Mapeo de secretos sensibles inyectados desde Google Cloud Secret Manager
          secrets: |-
            FIREBASE_CLIENT_EMAIL=FIREBASE_CLIENT_EMAIL_STAGING:latest
            FIREBASE_PRIVATE_KEY=FIREBASE_PRIVATE_KEY_STAGING:latest
