name: Pull Request Validation

on:
  pull_request:
    branches:
      - master
      - main
      - develop
      - staging
    paths-ignore:
      - '**.md'

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Verificar tipos de Nuxt y TypeScript
      - name: Typecheck
        run: npx nuxi typecheck

      # Simular el proceso de build de SSR
      - name: Verify build
        run: npm run build
        env:
          # Inyectamos strings dummy para que el pre-render de Nuxt/Nitro no falle 
          # por falta de variables públicas al armar el runtimeConfig.
          NUXT_PUBLIC_FIREBASE_API_KEY: 'mock-key'
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'mock-domain'
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: 'mock-project'
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'mock-bucket'
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 'mock-sender'
          NUXT_PUBLIC_FIREBASE_APP_ID: 'mock-id'
          NUXT_PUBLIC_FIREBASE_MEASUREMENT_ID: 'mock-measurement'
          FIREBASE_PROJECT_ID: 'mock-project'
          FIREBASE_CLIENT_EMAIL: 'mock-email@example.com'
          FIREBASE_PRIVATE_KEY: 'mock-key'
