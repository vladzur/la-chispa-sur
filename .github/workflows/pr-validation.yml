name: Pull Request Validation

on:
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run build
        env:
          # Para que Vite reemplace explícitamente las variables, aunque en PR de repositorios públicos 
          # los secrets no suelen estar disponibles, se inyectan strings vacías/dummy de ser necesario. 
          # Vite por defecto compila sin problemas aunque estén vacías.
          VITE_FIREBASE_API_KEY: 'mock-key'
          VITE_FIREBASE_AUTH_DOMAIN: 'mock-domain'
          VITE_FIREBASE_PROJECT_ID: 'mock-project'
          VITE_FIREBASE_STORAGE_BUCKET: 'mock-bucket'
          VITE_FIREBASE_MESSAGING_SENDER_ID: 'mock-sender'
          VITE_FIREBASE_APP_ID: 'mock-id'
          VITE_FIREBASE_MEASUREMENT_ID: 'mock-measurement'
